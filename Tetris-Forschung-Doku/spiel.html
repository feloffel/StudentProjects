<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris spielen: Der Tetris-Effekt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20">
<style>
  .spiel-page{max-width:1100px;margin:0 auto;padding:clamp(24px,5vw,56px) clamp(20px,5vw,48px)}
  .spiel-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px;margin-bottom:8px}
  .spiel-head a{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--mint);text-decoration:none;opacity:.85}
  .spiel-head a:hover{opacity:1}
</style>
</head>
<body>

<!-- Hintergrund-Tetris (fallende Steine) -->
<div class="bg-tetris bg-tetris--left" id="bgLeft" aria-hidden="true"></div>
<div class="bg-tetris bg-tetris--right" id="bgRight" aria-hidden="true"></div>

<main class="spiel-page">
  <div class="spiel-head">
    <div class="kicker" style="--kc:#ff9f1f">Trainingsspiel</div>
    <a href="index.html">← zur Doku</a>
  </div>
  <h1 class="big" style="margin-bottom:18px">Tetris<span class="dot"></span></h1>

  <div class="tetris-app">
    <div class="game-col">
      <div class="game-frame">
        <canvas id="game"></canvas>
        <button class="game-start" id="game-start">▶ Spiel starten</button>
        <button class="game-pause" id="game-pause" aria-label="Pause">⏸</button>
        <div class="game-pause-overlay" id="game-pause-overlay"><span>▶ Fortsetzen</span></div>
        <div class="game-over-overlay" id="game-over-overlay">
          <span class="go-title">Game Over</span>
          <button class="game-restart" id="game-restart">▶ Neu starten</button>
        </div>
      </div>
      <div class="touch-controls" aria-label="Touch-Steuerung">
        <button class="tc" id="t-left" aria-label="Nach links">←</button>
        <button class="tc" id="t-rotate" aria-label="Drehen">⟳</button>
        <button class="tc" id="t-right" aria-label="Nach rechts">→</button>
        <button class="tc" id="t-down" aria-label="Schneller">↓</button>
        <button class="tc" id="t-drop" aria-label="Hard-Drop">⤓</button>
        <button class="tc" id="t-restart" aria-label="Neustart">↻</button>
      </div>
    </div>
    <div class="game-side">
      <div id="leaderboard-panel">
        <h2>Top 10</h2>
        <ul id="leaderboard-list"><li>Lade...</li></ul>
      </div>
      <div class="game-help">
        <h4>Steuerung</h4>
        <ul>
          <li><span class="key">←</span> <span class="key">→</span> bewegen</li>
          <li><span class="key">↑</span> drehen</li>
          <li><span class="key">↓</span> schneller fallen</li>
          <li><span class="key">Leer</span> Hard-Drop</li>
          <li><span class="key">R</span> Neustart</li>
        </ul>
        <p>Am Handy: die Tasten unter dem Spielfeld nutzen.</p>
      </div>
    </div>
  </div>
</main>

<!-- Game-Over-Eintrag (Overlay) -->
<div id="score-submit-overlay">
  <form id="score-submit-form">
    <div>Game Over! Score: <span id="score-submit-value">0</span> &middot; Level: <span id="score-submit-level">0</span></div>
    <input id="score-submit-name" type="text" placeholder="Dein Name" maxlength="20">
    <div>
      <button type="submit">Eintragen</button>
      <button type="button" id="score-submit-skip">Ohne Eintrag schlie&szlig;en</button>
    </div>
  </form>
</div>

<!-- Ausklappbarer Musik-Player -->
<div class="music" id="musicPlayer">
  <div class="music-panel" id="musicPanel">
    <div class="music-head">
      <span class="music-title" id="musicTitle">Hintergrundmusik</span>
      <button class="music-close" id="musicClose" aria-label="Einklappen">×</button>
    </div>
    <div class="music-row">
      <button class="music-play" id="musicPlay" aria-label="Abspielen / Pause">▶</button>
      <input type="range" id="musicSeek" min="0" max="100" value="0" aria-label="Position">
      <span class="music-time" id="musicTime">0:00</span>
    </div>
    <div class="music-row">
      <span class="music-vol-ic">VOL</span>
      <input type="range" id="musicVol" min="0" max="100" value="70" aria-label="Lautstärke">
    </div>
    <p class="music-note" id="musicNote"></p>
  </div>
  <button class="music-toggle" id="musicToggle" aria-label="Musik-Player öffnen">♪</button>
  <audio id="musicAudio" src="assets/music/hintergrund.mp3" loop preload="none"></audio>
</div>

<script src="js/bg-tetris.js?v=20"></script>
<script src="js/music.js?v=20"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/leaderboard.js?v=20"></script>
<script src="js/game.js?v=20"></script>
<script src="js/game-init.js?v=20"></script>
</body>
</html>
