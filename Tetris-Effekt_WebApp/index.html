<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex">
<title>Wahrnehmungs-Studie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c1226; --bg2:#0a0f20; --panel:#141d3a; --panel2:#192349;
  --ink:#eef2fb; --muted:#8b96bd; --line:rgba(255,255,255,.10);
  --accent:#3b82f6; --accent2:#22d3ee; --ok:#34d399; --no:#f87171;
  --r:18px; --shadow:0 24px 60px -28px rgba(0,0,0,.8);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(1200px 800px at 80% -10%, rgba(59,130,246,.12), transparent 60%),
    radial-gradient(900px 700px at -10% 110%, rgba(34,211,238,.08), transparent 55%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--ink); font-family:'Outfit',system-ui,sans-serif; line-height:1.5;
  display:flex; align-items:center; justify-content:center; padding:24px; -webkit-font-smoothing:antialiased;
}
#app{width:100%;max-width:700px}
.card{ background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); padding:34px 32px; animation:rise .4s cubic-bezier(.2,.8,.2,1); }
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
h1{font-size:1.7rem;margin:0;letter-spacing:-.02em}
h2.ttl{font-family:'JetBrains Mono',monospace;font-size:1.15rem;font-weight:700;margin:0 0 14px;color:var(--accent2)}
.sub{color:var(--muted);margin:.2rem 0 0;font-size:.95rem}
.lead{color:#d6def4;font-size:1.02rem;margin:0 0 18px}
.lead.center,.center{text-align:center}
.muted{color:var(--muted)}
.keys{font-family:'JetBrains Mono',monospace;font-size:.86rem;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin:0 0 18px}
.keys:empty{display:none;padding:0;border:0}
.brand{display:flex;gap:14px;align-items:center;margin-bottom:18px}
.logo{display:inline-flex}
.fld{display:block;margin:0 0 14px}
.fld span{display:block;font-size:.82rem;color:var(--muted);margin-bottom:6px}
.fld input,.fld select,.fld textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:13px 14px;font:inherit;font-size:1rem;outline:none;transition:.18s}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--accent);background:rgba(59,130,246,.08)}
.fld input.err{border-color:var(--no)}
.hint{font-size:.85rem;color:var(--muted);margin:.2rem 0 12px}
.cloud{font-size:.82rem;font-family:'JetBrains Mono',monospace;padding:9px 12px;border-radius:10px;margin:6px 0 18px;border:1px solid var(--line)}
.cloud.on{color:var(--ok);background:rgba(52,211,153,.08)}
.cloud.off{color:#f5c451;background:rgba(245,196,81,.07)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;cursor:pointer;font:inherit;font-weight:600;border-radius:12px;padding:14px 18px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--ink);transition:.16s;margin-top:10px}
.btn:hover{background:rgba(255,255,255,.09);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.primary{background:linear-gradient(180deg,var(--accent),#2563eb);border-color:transparent;box-shadow:0 12px 30px -14px var(--accent)}
.btn.ghost{background:transparent}
.btn.big{font-size:1.05rem;padding:16px}
.btn[disabled]{opacity:.55;cursor:default;transform:none}
kbd{font-family:'JetBrains Mono',monospace;font-size:.72rem;background:rgba(0,0,0,.35);border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--accent2)}
.progress{display:flex;gap:5px;margin:0 0 22px;flex-wrap:wrap}
.pstep{flex:1 1 auto;display:flex;align-items:center;gap:6px;font-size:.66rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.pdot{width:8px;height:8px;border-radius:3px;background:rgba(255,255,255,.16);flex:none}
.pstep.active{color:var(--ink)}.pstep.active .pdot{background:var(--accent2)}
.pstep.done .pdot{background:var(--ok)}
.test{padding:22px 22px 28px}
.testhead{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:8px}
.stage{min-height:380px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:18px 0;border-radius:14px;transition:background .2s}
.stage.ok{background:rgba(52,211,153,.08)}
.stage.no{background:rgba(248,113,113,.08)}
.fix{font-size:2.4rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.vs{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:1.4rem}
.answers{display:grid;gap:12px;width:100%}
.answers.two{grid-template-columns:1fr 1fr}
.answers.four{grid-template-columns:1fr 1fr;max-width:440px}
.answers.five{grid-template-columns:repeat(5,minmax(0,1fr));max-width:560px}
.timerbar{display:none}
.timerbar.on{display:flex;align-items:center;gap:10px;margin:2px 0 16px}
.cd-track{flex:1;height:7px;border-radius:7px;background:rgba(255,255,255,.10);overflow:hidden}
.cd-fill{height:100%;width:100%;background:linear-gradient(90deg,#22d3ee,#6366f1)}
.timerbar.warn .cd-fill{background:linear-gradient(90deg,#fb7185,#f59e0b)}
.cd-num{font-family:'JetBrains Mono',monospace;font-size:.95rem;color:var(--muted);min-width:46px;text-align:right}
.timerbar.warn .cd-num{color:#fca5a5}
.ans{flex-direction:row}
.ans.opt{flex-direction:column;padding:12px;min-height:110px}
.answers.num .ans{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700}
.welllbl{font-size:.9rem;color:var(--muted);margin-top:6px}
.pair3d{display:flex;align-items:center;gap:16px}
.shp3d{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:14px;padding:8px}
.shp3d.single{display:inline-block}
.shp3d.single .rotimg{width:auto;max-width:min(620px,92vw);max-height:48vh}
.rotimg{display:block;width:200px;max-width:38vw;height:auto;border-radius:8px;background:#0a0f20}
.gap .well{display:flex;flex-direction:column;align-items:center;gap:8px}
.eq{font-family:'JetBrains Mono',monospace;font-size:2.6rem;font-weight:700}
.corsiboard{position:relative;width:240px;height:194px;margin:0 auto}
.cblk{position:absolute;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#3a4263;cursor:pointer;transition:.12s;padding:0}
.cblk:disabled{cursor:default}
.cblk.lit{background:var(--accent2);box-shadow:0 0 26px -3px var(--accent2);transform:scale(1.12)}
.cblk.tap{background:var(--accent);transform:scale(.9)}
.status{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:.9rem}
.time .timebox{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;max-width:340px}
.timewait{color:var(--muted);font-size:.95rem;text-align:center}
.foldsteps{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
.foldsteps .arrow{color:var(--muted);font-size:1.2rem}
.foldq{font-size:.95rem;color:var(--muted)}
.rtrow{display:flex;gap:14px}
.rtbox{width:78px;height:78px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center}
.rtbox.lit{background:var(--accent2);box-shadow:0 0 30px -4px var(--accent2)}
.ruleban{font-family:'JetBrains Mono',monospace;font-size:.95rem;padding:8px 16px;border-radius:10px;border:1px solid var(--line)}
.switch.r-size .ruleban{background:rgba(34,211,238,.12);color:var(--accent2)}
.switch.r-par .ruleban{background:rgba(245,196,81,.14);color:#f5c451}
.bignum{font-family:'JetBrains Mono',monospace;font-size:4.5rem;font-weight:700;line-height:1}
.pgrid{background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:14px;padding:10px}
.packrow{display:flex;gap:26px;align-items:center;justify-content:center;flex-wrap:wrap}
.packbox,.packpiece{display:flex;flex-direction:column;align-items:center;gap:8px}
.packlbl{font-size:.8rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.searchgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;max-width:420px}
.sitem{width:40px;height:40px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.03);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.sitem:hover{background:rgba(255,255,255,.08)}
.conhead{font-size:.95rem;color:#d6def4;margin-bottom:6px;text-align:center}
.conhead .tgt{color:#f5c451;font-size:1.2rem}
.congrid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;max-width:460px;min-height:200px}
.csym{font-size:1.7rem;text-align:center;cursor:pointer;color:#aeb8da;user-select:none;transition:transform .1s}
.csym:hover{transform:scale(1.2)}
.csym.ct{color:#f5c451}
.big-tick{display:flex;justify-content:center;margin-bottom:6px}
@media(max-width:560px){
  .card{padding:24px 18px}
  .answers.two{grid-template-columns:1fr}
  .answers.five{gap:6px}
  .searchgrid{grid-template-columns:repeat(6,1fr)}
  .congrid{grid-template-columns:repeat(5,1fr)}
  .pair3d{flex-direction:column}
}
</style>
</head>
<body>
  <main id="app"></main>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="MentalRotationImages/manifest.js"></script>
  <script src="tests.js"></script>
  <script src="app.js"></script>
</body>
</html>
